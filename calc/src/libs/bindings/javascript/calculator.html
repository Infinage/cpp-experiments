<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | WASM Edition</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; --err: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .calc-card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: var(--accent); box-sizing: border-box; font-family: monospace; font-size: 1.1rem; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #output { margin-top: 20px; padding: 10px; border-radius: 4px; min-height: 1.5em; text-align: center; }
        .error-text { color: var(--err) !important; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

<div class="calc-card">
    <h2 style="margin:0">Calculator</h2>
    <p style="font-size: 0.8rem; color: #94a3b8;">Powered by WebAssembly &amp; Embind</p>
    
    <input type="text" id="exprInput" placeholder="5 + (2 * 3)">
    <button id="runBtn">Calculate</button>
    
    <div id="output">Initialize WASM...</div>
</div>

<script src="calculator.js"></script>
<script>
    let calculator;
    const input = document.getElementById('exprInput');
    const btn = document.getElementById('runBtn');
    const output = document.getElementById('output');

    // Emscripten callback when WASM is ready
    Module.onRuntimeInitialized = () => {
        calculator = new Module.Calculator();
        output.innerText = "Ready for input.";
        output.style.color = "#94a3b8";
    };

    btn.addEventListener('click', () => {
        if (!calculator) return;

        // Reset UI state
        output.classList.remove('error-text');
        output.style.color = "var(--text)";

        // FFI Call: C++ returns a JS Object {value, error, success}
        const res = calculator.compute(input.value);

        if (res.success) {
            output.innerHTML = `<strong>Result: ${res.value}</strong>`;
            output.style.color = "var(--accent)";
        } else {
            output.innerText = `Error: ${res.error}`;
            output.classList.add('error-text');
        }
    });

    // Allow Enter key to trigger calculation
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') btn.click(); });
</script>

</body>
</html>
